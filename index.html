<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Game</title>

    <link href="./assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

</head>

<body>

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="text-center">

            <!-- Welcome Card -->
            <div id="welcome" class="card p-4 quiz-card">

                <h1 class="quiz-title display-6 mb-3 text-white">Ultimate Quiz</h1>

                <p class="mb-2 text-white">Enter Your Name :</p>

                <input type="text" class="form-control mb-4" id="playerName" placeholder="Your Name">

                <button class="btn start-btn w-100 fs-4" onclick="startQuiz()">
                    Start Quiz
                </button>

            </div>

            <!-- Countdown -->
            <h1 id="countdown" class="display-1 mt-4 text-white"></h1>

            <!-- Quiz Box -->
            <div id="quizBox" class="card p-4 quiz-card mt-3">
                <h6 id="questionNumber" class="text-light mb-3"></h6>
                <h4 id="question" class="text-white mb-2 fs-5"></h4>

                <div class="row mt-3 g-3">
                    <button class="btn btn-outline-primary w-100 option" onclick="checkAnswer(0)" aria-label="Next Question"></button>
                    <button class="btn btn-outline-primary w-100 option" onclick="checkAnswer(1)" aria-label="Next Question"></button>
                    <button class="btn btn-outline-primary w-100 option" onclick="checkAnswer(2)" aria-label="Next Question"></button>
                    <button class="btn btn-outline-primary w-100 option" onclick="checkAnswer(3)" aria-label="Next Question"></button>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <button class="btn start-btn fs-6 mt-4" onclick="nextbtn()">
                            Next <i class="ri-arrow-right-line"></i>
                        </button>
                    </div>

                    <h5 class="mt-3 text-white">
                        Time Left: <span id="timer" class="fw-bold">15</span>
                    </h5>
                </div>

            </div>

            <!-- Result -->
            <div id="result" class="card p-4 quiz-card mt-3" style="display:none;">

                <h4 id="finalName" class="text-white mb-2"></h4>

                <h6 id="finalScore" class="text-white"></h6>

                <button class="btn start-btn w-100 fs-4 mt-3" onclick="RestartQuiz()">
                    Restart Quiz
                </button>

            </div>

        </div>
    </div>

    <audio id="correctSound" src="./assets/Audio/correct.mp3" preload="auto"></audio>
    
    <audio id="wrongSound" src="./assets/Audio/wrong.mp3" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>
    <script src="./assets/js/script.js"></script>

</body>

</html>
